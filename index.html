<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bassin de la Muette</title>

<style>
:root {
    --overlay-light: rgba(255,255,255,0.25);
    --radius: 20px;
}

body {
    background: linear-gradient(to bottom, #E6D0AF, #9fc8b6, #65A8AB, #9fc8b6, #E6D0AF);
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    text-align: center;
}

h1,h2,p { color: #1c3d4a; }

.corner {
    position: fixed;
    width: 150px;
    pointer-events: none;
    z-index: 2;
}

.top-right { top: 0; right: 0; }
.bottom-left { bottom: 0; left: 0; }

.banner {
    margin-top: 20px;
    width: 150px;
    max-width: 80%;
}

.hero-image {
    margin: 5px auto;
    width: 80%;
    max-width: 700px;
    max-height: 100px;
    border-radius: var(--radius);
    background: url('images/Bassin_Muette.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero-image h1 {
    color: white;
    font-size: 1.7rem;
    margin: 0;
}

.info-center {
    max-width: 750px;
    margin: 15px auto;
    padding: 10px 15px;
    background: var(--overlay-light);
    border-radius: var(--radius);
}

.bottom-section {
    margin: 60px auto;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 60px;
    flex-wrap: wrap;
    position: relative;
}

#frog {
    position: fixed;
    bottom: -20px;
    left: 10px;
    width: 140px;
    z-index: 101;
    pointer-events: none;
}

.speech-container {
    position: fixed;
    bottom: 190px;
    left: 20px;
    display: flex;
    gap: 8px;
    z-index: 101;
}

.speech-bubble {
    background: white;
    border: 3px solid #1c3d4a;
    border-radius: 18px;
    padding: 12px;
}

.speech-next {
    background: #1c3d4a;
    color: white;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
}

.info-card {
    display: none;
    margin: 80px auto;
    padding: 25px;
    max-width: 600px;
    background: var(--overlay-light);
    border-radius: var(--radius);
}

.lilypad-row {
    background: var(--overlay-light);
    border-radius: var(--radius);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.rectangle {
    width: 85px;
    height: 85px;
    background: url('images/Text_box_2_red.png') center/contain no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

iframe {
    width: 100%;
    height: 260px;
    border: none;
    border-radius: 15px;
    margin-top: 15px;
}
</style>

</head>

<body>

<img src="images/nenuphar.png" class="corner top-right">
<img src="images/nenuphar_4.png" class="corner bottom-left">

<img src="images/banner2.png" class="banner">

<div class="hero-image">
    <h1>Welcome to the<br>Bassin de la Muette</h1>
</div>

<div class="info-center">
    <p>Lake monitoring system</p>
</div>

<div class="bottom-section">

<img id="frog" src="images/sargouset_2/eo_mc.PNG">

<div class="speech-container" id="speech-container">
    <div class="speech-bubble">
        <span id="speech-text">Hi! I'm Sargouset</span>
    </div>
    <button class="speech-next" id="speech-next">▶</button>
</div>

<div class="lilypad-row">
    <div class="rectangle" data-type="temperature">Temperature</div>
    <div class="rectangle" data-type="ph">pH</div>
    <div class="rectangle" data-type="turbidity">Turbidity</div>
    <div class="rectangle" data-type="conductivity">Conductivity</div>
</div>

<div class="info-card" id="temperature-card">
<h2>Temperature</h2>
<p><strong id="temperature">--</strong></p>
<iframe src="https://thingspeak.com/channels/3267133/charts/3?api_key=51RMF6RF0SNM01AP&results=20&dynamic=true"></iframe>
</div>

<div class="info-card" id="turbidity-card">
<h2>Turbidity</h2>
<p><strong id="turbidity">--</strong></p>
<iframe src="https://thingspeak.com/channels/3267133/charts/1?api_key=51RMF6RF0SNM01AP&results=20&dynamic=true"></iframe>
</div>

<div class="info-card" id="ph-card">
<h2>pH</h2>
<p><strong id="pH">--</strong></p>
<iframe src="https://thingspeak.com/channels/3267133/charts/4?api_key=51RMF6RF0SNM01AP&results=20&dynamic=true"></iframe>
</div>

<div class="info-card" id="conductivity-card">
<h2>Conductivity</h2>
<p><strong id="conductivity">--</strong></p>
<iframe src="https://thingspeak.com/channels/3267133/charts/2?api_key=51RMF6RF0SNM01AP&results=20&dynamic=true"></iframe>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

const speechText = document.getElementById("speech-text");

const parameterInfo = {
    temperature: "Temperature of the lake.",
    turbidity: "Water clarity.",
    ph: "Acidity of water.",
    conductivity: "Mineral content."
};

document.querySelectorAll(".rectangle").forEach(rect=>{
    rect.addEventListener("click", ()=>{
        const type = rect.dataset.type;

        document.querySelectorAll(".info-card").forEach(c=>c.style.display="none");

        const card = document.getElementById(type+"-card");
        if(card){
            card.style.display="block";
            card.scrollIntoView({behavior:"smooth"});
        }

        speechText.textContent = parameterInfo[type];
    });
});

/* ThingSpeak fetch */
async function fetchData(){
    const res = await fetch("https://api.thingspeak.com/channels/3267133/feeds.json?results=1");
    const data = await res.json();
    const last = data.feeds[0];

    document.getElementById("turbidity").textContent = last.field1;
    document.getElementById("conductivity").textContent = last.field2;
    document.getElementById("temperature").textContent = last.field3;
    document.getElementById("pH").textContent = last.field4;
}

fetchData();
setInterval(fetchData,15000);

});
</script>

</body>
</html>
